name: Build DoOn Li APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: 📥 Fazer checkout do código
        uses: actions/checkout@v3

      - name: 🐍 Instalar Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 📦 Instalar dependências do sistema
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk \
            autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            libtinfo5 cmake libffi-dev libssl-dev \
            python3-pip build-essential

      - name: 🔧 Instalar Buildozer e dependências Python
        run: |
          pip install --upgrade pip
          pip install buildozer cython==0.29.33

      - name: 🤖 Configurar Android SDK/NDK (cache)
        uses: actions/cache@v3
        with:
          path: |
            ~/.buildozer/android/platform
            ~/.buildozer/android/packages
          key: android-sdk-ndk-${{ hashFiles('buildozer.spec') }}
          restore-keys: android-sdk-ndk-

      - name: 🏗️ Compilar APK com Buildozer
        run: |
          buildozer android debug 2>&1 | tee build.log

      - name: 📤 Publicar APK como artefacto
        uses: actions/upload-artifact@v3
        with:
          name: DoOnLi-APK
          path: bin/*.apk
          retention-days: 30

      - name: 📋 Publicar log de compilação (em caso de erro)
        if: failure()
        uses: actions/upload-artifact@v3
        with:
          name: build-log
          path: build.log
